<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sum of Two Numbers</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e8c8c8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgb(126, 174, 223);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        #result {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
            color: rgb(4, 22, 37);
        }
     footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
    }

    </style>
</head>

<body>
    <!-- <header>
      <h1>Sum Calculator</h1>
  </header> -->
<main> 
<div class="container">
    <h2>Sum of Two Numbers</h2>

    <input type="number" id="num1" placeholder="Enter first number"><br>
    <input type="number" id="num2" placeholder="Enter second number"><br>

    <button onclick="calculateSum()">Add</button>
   <div id="result"> 
        <div id="result1"></div>
        <div id="result2"></div>
        <div id="result3"></div>
        <div id="result4"></div>
    </div>
</div>
</main>
  <!-- <footer>
    <p>© 2026 Simple Calculator | Created with HTML, CSS & JS</p>
  </footer> -->


<script>
    function calculateSum() {
        let n1 = parseFloat(document.getElementById("num1").value);
        let n2 = parseFloat(document.getElementById("num2").value);

        if(isNaN(1) || isNaN(n2)){
            document.getElementById("result1").innerHTML = "Please enter valid number";
        }else{

        //  let sum = n1 + n2;
        // document.getElementById("result1").innerHTML = "Sum = " + sum;
        // }
        let sum = n1 + n2;
        let minus = n1 - n2;
        let multi = n1 * n2;
        let division = n1 / n2;

        document.getElementById("result1").innerHTML = "Sum = " + sum;
        document.getElementById("result2").innerHTML = "Minus = " + minus;
        document.getElementById("result3").innerHTML = "Multiple = " + multi;
        document.getElementById("result4").innerHTML = "Division = " + division;
        }
    }
</script>

</body>
</html>
